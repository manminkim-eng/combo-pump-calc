<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f1f5f9;-webkit-font-smoothing:antialiased;}
input,select,button,td,th,div,span,p,h1,h2,label{font-family:'Noto Sans KR',sans-serif !important;}
@media print{
  @page{
    size:A4 portrait;
    margin:14mm 12mm 22mm 14mm;
    @bottom-right{
      content:"MANMIN-Ver3.3";
      font-family:'Orbitron',sans-serif;

  #report-zone{box-shadow:none !important;border:none !important;padding:0 !important;margin:0 !important;border-radius:0 !important;}
  .page-break{page-break-before:always;}
  .print-section{break-inside:avoid;page-break-inside:avoid;}
  #dev-stamp{display:block !important;text-align:right;font-size:9px;color:#94a3b8;margin-top:8px;}
}
#dev-stamp{display:none !important;}
.pwa-install-banner{background:linear-gradient(135deg,#1e3a5f 0%,#0f172a 100%);border:1px solid rgba(255,255,255,0.2);animation:slideUp .4s ease-out;}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}

/* ══ 반응형 그리드 ══ */
.g-proj{display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:14px;}
.g-res{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.g-res-inner{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.g-4cp{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.tab-bar-wrap{display:flex;gap:4px;padding-top:4px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar-wrap::-webkit-scrollbar{display:none;}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.sum-bar{display:flex;flex-wrap:wrap;gap:18px;}

/* ══ 계산식 안내 FAB ══ */
.formula-fab{
  position:fixed;bottom:80px;right:16px;z-index:1000;
  background:linear-gradient(135deg,#1e3a5f,#1d4ed8);
  color:white;border:none;border-radius:14px;
  padding:10px 14px;cursor:pointer;
  box-shadow:0 4px 18px rgba(30,58,95,0.5);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  line-height:1.3;font-family:'Noto Sans KR',sans-serif;
  transition:transform 0.15s,box-shadow 0.15s;
}
.formula-fab:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(30,58,95,0.6);}

/* ══ PWA 설치 FAB ══ */
.pwa-install-fab{
  position:fixed;bottom:16px;right:16px;z-index:1100;
  background:linear-gradient(135deg,#7c3aed 0%,#4c1d95 100%);
  color:white;border:none;border-radius:14px;
  padding:10px 14px;cursor:pointer;
  box-shadow:0 4px 20px rgba(124,58,237,0.55);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  line-height:1.3;font-family:'Noto Sans KR',sans-serif;
  transition:transform 0.15s,box-shadow 0.15s;
  animation:pwaFabIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pwaFabIn{
  from{opacity:0;transform:scale(0.4) rotate(-20deg);}
  to{opacity:1;transform:scale(1) rotate(0deg);}
}
.pwa-install-fab:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 8px 28px rgba(124,58,237,0.70);}
.pwa-install-fab:active{transform:scale(0.96);}
.pwa-install-fab-badge{
  position:absolute;top:-7px;right:-7px;
  background:#ef4444;color:white;font-size:8px;font-weight:900;
  width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid white;
  animation:badgePing 2s ease-in-out infinite;
}
@keyframes badgePing{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(239,68,68,0.6);}
  50%{transform:scale(1.18);box-shadow:0 0 0 5px rgba(239,68,68,0);}
}

/* ══ 계산식 안내 모달 ══ */
.fml-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.58);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:12px;}
.fml-box{background:white;border-radius:18px;max-width:780px;width:100%;max-height:92vh;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.32);display:flex;flex-direction:column;}
.fml-head{background:linear-gradient(135deg,#0f172a,#1e3a5f,#1d4ed8);color:white;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.fml-body{overflow-y:auto;padding:20px 22px;-webkit-overflow-scrolling:touch;}
.fml-body::-webkit-scrollbar{width:6px;}
.fml-body::-webkit-scrollbar-thumb{background:#bfdbfe;border-radius:3px;}
.fml-tabs{display:flex;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.fml-tab{padding:6px 16px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;font-family:'Noto Sans KR',sans-serif;}
.fml-tab.active-h{background:#b91c1c;color:white;}
.fml-tab.active-s{background:#15803d;color:white;}
.fml-tab.active-c{background:#1d4ed8;color:white;}
.fml-tab.active-how{background:linear-gradient(135deg,#0f172a,#1e3a5f);color:white;}
.fml-tab:not([class*="active"]){background:#f1f5f9;color:#374151;}
.fml-sec{margin-bottom:20px;}
.fml-sec-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px;padding-left:8px;}
.fml-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.fml-eq{font-family:'Noto Sans Mono',monospace;font-size:13px;font-weight:700;border-radius:6px;padding:6px 10px;margin:6px 0;display:block;word-break:break-all;}
.fml-note{font-size:10px;color:#6b7280;margin-top:4px;line-height:1.7;}

/* ══ 반응형 ══ */
@media(max-width:1024px){
  .g-4cp{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  .g-proj{grid-template-columns:1fr 1fr;}
  .g-res{grid-template-columns:1fr;}
  .hdr-row .hdr-right{display:none;}
}
@media(max-width:640px){
  .g-proj{grid-template-columns:1fr;}
  .g-4cp{grid-template-columns:repeat(2,1fr);}
  .hdr-row{flex-direction:column;gap:8px;}
}
@media(max-width:420px){
  .g-4cp{grid-template-columns:1fr;}
  .g-res-inner{grid-template-columns:1fr;}
}

/* ═══ A4 계산서 반응형 미리보기 ═══
   transform-origin:0 0 + translateX(lOff)scale(s):
   ① 794px(A4폭) 좌상단 기준 축소
   ② lOff=(outerW−794×scale)/2 → 정확한 중앙 정렬
   ③ outer.height=inner.scrollHeight×scale+40 → 여러 장·빈공간 보정
   인쇄: @media print { transform:none } 으로 원본 A4 복원          */
.rpt-outer{
  width:100%;overflow:hidden;
  background:#dbeafe;padding:20px 12px;
  border-radius:14px;margin-bottom:16px;
}
.rpt-inner{width:794px;}
.rpt-hint{
  display:none;
  align-items:center;gap:6px;
  background:#eff6ff;border:1px solid #93c5fd;border-radius:8px;
  padding:8px 13px;font-size:10px;font-weight:600;color:#1e40af;
  margin-bottom:10px;
}
@media(max-width:860px){.rpt-hint{display:flex;}}
@media print{
  .rpt-outer{background:white!important;padding:0!important;overflow:visible!important;
    border-radius:0!important;margin:0!important;height:auto!important;}
  .rpt-inner{transform:none!important;width:auto!important;margin:0!important;}
  .rpt-hint{display:none!important;}
}

/* ═══ 배관 구간 테이블 모바일 스크롤 힌트 ═══ */
.seg-hint{
  display:none;
  align-items:center;gap:6px;justify-content:center;
  font-size:11px;font-weight:700;color:#6b7280;
  padding:6px 0;
  background:#f8fafc;border:1px solid #e2e8f0;
  border-bottom:none;border-radius:6px 6px 0 0;
}
@media(max-width:860px){.seg-hint{display:flex;}}

/* ═══ Box 컴포넌트 CSS 클래스 ═══ */
.box-hd{color:white;padding:10px 18px;font-size:13px;font-weight:700;letter-spacing:0.04em;}
.box-bd{padding:16px;}
@media(max-width:640px){
  .box-hd{padding:9px 14px!important;font-size:11px!important;}
  .box-bd{padding:14px 12px!important;}
}

/* ═══ 메인 외부 래퍼 모바일 패딩 ═══ */
.main-outer{max-width:1320px;margin:0 auto;padding:0 24px;}
.main-inner{padding-top:20px;padding-bottom:40px;}
@media(max-width:640px){
  .main-outer{padding:0 10px;}
  .main-inner{padding-top:14px;padding-bottom:80px;}
  .hdr-h1{font-size:18px!important;}
  .hdr-pad{padding:0 14px!important;}
}
@media(max-width:420px){
  .main-outer{padding:0 8px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">
const { useState, useMemo, useEffect } = React;

/* ══════════════════════════════════════════════════════════════
   공통 상수
══════════════════════════════════════════════════════════════ */
const FLOW_PER_HYDRANT = 130;   // 옥내소화전 개당 방사량 (ℓ/min)
const H_NOZZLE         = 17;    // 옥내소화전 노즐 환산수두 (m)
// H_WATER_TIME: buildingFloor에 따라 20/40/60 동적 적용 (NFTC 102 + NFTC 604)

const FLOW_PER_HEAD    = 80;    // 스프링클러 헤드 개당 방사량 (ℓ/min)
const S_NOZZLE         = 10;    // 스프링클러 헤드 최소방수압 환산수두 (m)
// S_WATER_PER: buildingFloor에 따라 1.6/3.2/4.8 동적 적용 (NFTC 103 + NFTC 604)

const PIPE_CONFIG = {
  SCH10:{label:"배관용 탄소강관 KS D3507 (백관)",       shortLabel:"KS D3507",      C:120,
         inner:{25:27.6,32:36.2,40:42.1,50:53.2,65:69.0,80:81.0,100:105.3,125:130.1,150:155.5,200:204.6}},
  SCH40:{label:"압력배관용 탄소강관 KS D3562 (흑관)",   shortLabel:"KS D3562",      C:120,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:77.9,100:102.3,125:128.2,150:154.1,200:202.7}},
  STS:  {label:"배관용 스테인리스강관 KS D3595",        shortLabel:"STS",           C:150,
         inner:{25:27.6,32:36.8,40:42.8,50:54.8,65:70.0,80:85.0,100:108.2,125:133.4,150:160.0,200:210.0}},
  CPVC: {label:"내식성 CPVC관 (소방용)",               shortLabel:"CPVC",          C:150,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:79.4,100:101.6,125:127.0,150:154.1,200:203.2}},
};
const FITTING_EQ={
  25:[0.9,0.54,1.5,0.27,0.18,7.5,4.5,2.0],  32:[1.2,0.72,1.8,0.36,0.24,10.5,5.4,2.5],
  40:[1.5,0.90,2.1,0.45,0.30,13.8,6.5,3.1], 50:[2.1,1.20,3.0,0.60,0.39,16.5,8.4,4.0],
  65:[2.4,1.30,3.6,0.75,0.48,19.5,10.2,4.6],80:[3.0,1.80,4.5,0.90,0.60,24.0,12.0,5.7],
  100:[4.2,2.40,6.3,1.20,0.81,37.5,16.5,7.6],125:[5.1,3.00,7.5,1.50,0.99,42.0,21.0,10.0],
  150:[6.0,3.60,9.0,1.80,1.20,49.5,24.0,12.0],200:[6.5,3.70,14.0,4.00,1.40,70.0,33.0,15.0],
};
const HOSE_TYPES={
  1:{label:"40mm 아마호스",     rate:26, fixed:null},
  2:{label:"40mm 고무내장호스", rate:12, fixed:null},
  3:{label:"50mm 아마호스",     rate:7,  fixed:null},
  4:{label:"50mm 고무내장호스", rate:3,  fixed:null},
  5:{label:"25mm 호스릴",       rate:0,  fixed:14},
};
const BASE_HEAD_TYPES=[
  {key:"A30", label:"30개 — 공장(특수가연물), 근린·판매·운수시설 복합건축물",n:30},
  {key:"A30b",label:"30개 — 지하층 제외 11층 이상·지하가·지하역사",n:30},
  {key:"A20a",label:"20개 — 공장(그 밖의 것), 복합건축물(그 밖의 것)",n:20},
  {key:"A20b",label:"20개 — 헤드 부착높이 8m 이상 특정소방대상물",n:20},
  {key:"A10", label:"10개 — 헤드 부착높이 8m 미만 특정소방대상물 (일반)",n:10},
];
const TRANS_TYPE={1:{label:"전동기 직결",k:1.1},2:{label:"전동기 이외의 원동기",k:1.15}};
const H_PIPE_SIZES=[40,50,65,80,100,125,150,200];
const S_PIPE_SIZES=[25,32,40,50,65,80,100,125,150,200];
const PUMP_SIZES=[40,50,65,80,100,125,150];
const HP_STEPS=[3,5,7.5,10,15,20,25,30,40,50,60,75,100,125,150,200];
const BD="1px solid #d1d5db";

function calcFriction(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const id=(cfg.inner[D]||D)/1000;
  const Qm=Q/1000/60;
  return 10.67*Math.pow(Qm,1.852)/(Math.pow(cfg.C,1.852)*Math.pow(id,4.87));
}
function calcVelocity(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const id=(cfg.inner[D]||D)/1000;
  const Qm=Q/1000/60;
  return Qm/(Math.PI/4*id*id);
}
function nextHP(kw){const hp=kw*1.341;for(const h of HP_STEPS){if(h>=hp)return h;}return Math.ceil(hp/5)*5;}
const f2=v=>isNaN(v)?"-":Number(v).toFixed(2);
const f3=v=>isNaN(v)?"-":Number(v).toFixed(3);
const ff=(v,d=1)=>isNaN(v)?"-":Number(v).toFixed(d);

/* ── 공통 UI 컴포넌트 ── */
function LabelEl({children}){return <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:5,letterSpacing:"0.02em"}}>{children}</div>;}
function Sel({val,onChange,children,style={}}){
  return <select value={val} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none",...style}}>{children}</select>;
}
function InpNum({val,onChange,unit,min,max}){
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <input type="number" value={val} min={min} max={max}
      onChange={e=>onChange(+(e.target.value))}
      style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none"}}/>
    {unit&&<span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>{unit}</span>}
  </div>;
}
function EffInp({val,onChange}){
  return <div style={{display:"flex",alignItems:"center",gap:6}}>
    <input type="number" value={val} min={10} max={80} step={1}
      onChange={e=>{const v=Math.min(80,Math.max(10,parseInt(e.target.value)||10));onChange(v);}}
      style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none"}}/>
    <span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>%</span>
  </div>;
}
function Box({title,children,color="#1e3a5f"}){
  return <div style={{background:"white",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.08)",marginBottom:16,overflow:"hidden"}}>
    <div className="box-hd" style={{background:color}}>{title}</div>
    <div className="box-bd">{children}</div>
  </div>;
}
function Card({label,value,unit,formula,bc}){
  const cols={blue:["#eff6ff","#1d4ed8"],orange:["#fff7ed","#c2410c"],green:["#f0fdf4","#15803d"],red:["#fef2f2","#b91c1c"],purple:["#faf5ff","#7c3aed"]};
  const [bg,tc]=cols[bc]||["#f8fafc","#374151"];
  return <div style={{background:bg,borderRadius:10,padding:"12px 14px",border:`1px solid ${tc}22`}}>
    <div style={{fontSize:10,color:"#6b7280",marginBottom:4}}>{label}</div>
    <div style={{fontSize:20,fontWeight:900,color:tc,fontFamily:"'Noto Sans Mono',monospace",lineHeight:1.1}}>
      {value}<span style={{fontSize:11,color:"#9ca3af",marginLeft:4}}>{unit}</span>
    </div>
    {formula&&<div style={{fontSize:9,color:"#9ca3af",marginTop:4,fontFamily:"'Noto Sans Mono',monospace"}}>{formula}</div>}
  </div>;
}
function PipeTable({segs,setSegs,pipeType,pipeSizes,velLimit,velLimit2,label,velLabel,flowOpts}){
  const HDRS=["NO","유량\n(ℓ/min)","관경\n(A)","직관\n(m)","90°\nElbow","45°\nElbow","분류\nTee","직류\nTee","Gate\nV/V","Ball\nV/V","Angle\nV/V","Check\nV/V","상당직관\n(m)","마찰계수\n(m/100m)","손실수두\n(m)","유속\n(m/s)","×"];
  const upd=(i,k,v)=>setSegs(p=>{const n=[...p];n[i]={...n[i],[k]:v};return n;});
  const add=()=>setSegs(p=>[...p,{flow:flowOpts?flowOpts[0]:130,dia:100,len:10,e90:0,e45:0,teeB:0,teeS:0,gate:0,ball:0,angle:0,check:0}]);
  const del=i=>setSegs(p=>p.filter((_,j)=>j!==i));
  return <Box title={label} color="#334155">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,flexWrap:"wrap",gap:8}}>
      <span style={{fontSize:11,color:"#6b7280"}}>구간별 유량·관경·직관길이·관부속 수량 입력 → 손실수두 자동계산</span>
      <button onClick={add} style={{padding:"6px 14px",background:"#334155",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12,flexShrink:0}}>+ 구간 추가</button>
    </div>
    {/* 모바일 스크롤 안내 (860px 이하에서만 표시) */}
    <div className="seg-hint">
      <span style={{fontSize:14}}>←</span>
      <span>좌우로 스크롤하여 모든 항목 입력</span>
      <span style={{fontSize:14}}>→</span>
    </div>
    <div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <colgroup>
          <col style={{width:"3%"}}/><col style={{width:"7%"}}/><col style={{width:"6%"}}/><col style={{width:"6%"}}/>
          <col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/>
          <col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/><col style={{width:"5%"}}/>
          <col style={{width:"7%"}}/><col style={{width:"8%"}}/><col style={{width:"7%"}}/><col style={{width:"6%"}}/><col style={{width:"2%"}}/>
        </colgroup>
        <thead>
          <tr style={{background:"#1e3a5f",color:"white"}}>
            {HDRS.map((h,i)=><th key={i} style={{border:BD,padding:"5px 2px",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.3,fontSize:9,fontWeight:700}}>{h}</th>)}
          </tr>
        </thead>
        <tbody>
          {segs.map((s,i)=>{
            const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
            const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
            const tl=(s.len||0)+fl;
            const fric=calcFriction(s.flow,s.dia,pipeType);
            const hl=fric*tl/100;
            const vel=calcVelocity(s.flow,s.dia,pipeType);
            const lim=velLimit||4;
            const lim2=velLimit2||10;
            const vW=vel>lim2?"⚠":vel>lim?"⚡":"";
            const num=(k,v)=><input type="number" value={v} onChange={e=>upd(i,k,+(e.target.value))}
              style={{width:"100%",padding:"2px",textAlign:"center",fontSize:10,border:"1px solid #e5e7eb",borderRadius:4,fontFamily:"'Noto Sans Mono',monospace",background:"white"}}/>;
            return <tr key={i} style={{background:i%2?"#f9fafb":"white"}}>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontWeight:700}}>{i+1}</td>
              <td style={{border:BD,padding:"2px"}}>
                {flowOpts
                  ? <select value={s.flow} onChange={e=>upd(i,"flow",+e.target.value)}
                      style={{width:"100%",padding:"2px",fontSize:10,border:"1px solid #e5e7eb",borderRadius:4,fontFamily:"'Noto Sans Mono',monospace",background:"white",textAlign:"center"}}>
                      {flowOpts.map(f=><option key={f} value={f}>{f}</option>)}
                    </select>
                  : num("flow",s.flow)
                }
              </td>
              <td style={{border:BD,padding:"2px"}}>
                <select value={s.dia} onChange={e=>upd(i,"dia",+e.target.value)}
                  style={{width:"100%",padding:"2px",fontSize:10,border:"none",background:"transparent",fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}>
                  {pipeSizes.map(d=><option key={d} value={d}>{d}</option>)}
                </select>
              </td>
              <td style={{border:BD,padding:"2px"}}>{num("len",s.len)}</td>
              {["e90","e45","teeB","teeS","gate","ball","angle","check"].map(k=>(
                <td key={k} style={{border:BD,padding:"2px"}}>{num(k,s[k])}</td>
              ))}
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace"}}>{f3(fl)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:"#c2410c",fontWeight:700}}>{f3(fric)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:"#1d4ed8",fontWeight:700}}>{f3(hl)}</td>
              <td style={{border:BD,padding:"4px 2px",textAlign:"center",fontSize:10,fontFamily:"'Noto Sans Mono',monospace",color:vW?"#dc2626":"#374151",fontWeight:vW?700:400}}>{f2(vel)}{vW?" "+vW:""}</td>
              <td style={{border:BD,padding:"2px",textAlign:"center"}}><button onClick={()=>del(i)} style={{background:"#fee2e2",border:"none",borderRadius:4,cursor:"pointer",color:"#dc2626",fontSize:11,fontWeight:700,padding:"2px 6px"}}>×</button></td>
            </tr>;
          })}
          <tr style={{background:"#f1f5f9"}}>
            <td colSpan={14} style={{border:BD,padding:"5px 10px",fontWeight:700,fontSize:11,color:"#374151"}}>배관 마찰손실 합계 (F)</td>
            <td style={{border:BD,padding:"5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",color:"#1d4ed8",fontWeight:900,fontSize:13}}>
              {f3(segs.reduce((s2,s)=>{const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];const tl=(s.len||0)+fl;return s2+calcFriction(s.flow,s.dia,pipeType)*tl/100;},0))}
            </td>
            <td colSpan={2} style={{border:BD}}></td>
          </tr>
        </tbody>
      </table>
    </div>
    <div style={{marginTop:8,textAlign:"right"}}>
      <button onClick={add} style={{padding:"6px 14px",background:"#334155",color:"white",border:"none",borderRadius:8,cursor:"pointer",fontWeight:700,fontSize:12}}>+ 구간 추가</button>
    </div>
    <div style={{marginTop:8,padding:"7px 12px",background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:8,fontSize:11,color:"#991b1b",fontFamily:"'Noto Sans KR',sans-serif",fontWeight:600}}>
      {velLabel||`⚠️ 유속 제한: ≤ ${velLimit||4} m/s — 초과 시 ⚡ 표시`}
    </div>
    <div style={{marginTop:8,padding:"10px 14px",background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:8}}>
      <div style={{fontSize:11,fontWeight:700,color:"#374151",marginBottom:6}}>【 관부속 상당직관 적용 참고사항 】</div>
      <ol style={{margin:0,paddingLeft:18,fontSize:10,color:"#6b7280",lineHeight:2}}>
        <li>Elbow, Tee는 <b>나사접합</b>을 기준으로 한 것임.&nbsp;&nbsp;(용접의 경우 손실을 더 적게 적용)</li>
        <li>Reducer는 <b>45°Elbow</b>와 같다.&nbsp;&nbsp;(다만, 관경이 작은 쪽에 따른다.)</li>
        <li>Coupling은 <b>직류 Tee</b>와 같다.</li>
        <li>Union, Flange, Socket은 손실수두가 미소하여 <b>생략</b>한다.</li>
        <li>Auto Valve(포소화전 설비), Glove Valve는 <b>Ball Valve</b>와 같다.</li>
        <li>Alarm Valve, Foot Valve 및 Strainer는 <b>Angle Valve</b>와 같다.</li>
      </ol>
    </div>
  </Box>;
}

function App(){

    {flow:390,dia:100,len:30,e90:3,e45:2,teeB:1,teeS:12,gate:2,ball:0,angle:2,check:1},

  /* 스프링클러 상태 */
  const [sSys,setSSys]=useState({baseType:"A10",actualHead:65,pipeType:"SCH10",branchVelLimit:6});
  const ssS=(k,v)=>setSSys(p=>({...p,[k]:v}));
  const [sSegs,setSSegs]=useState([
    {flow:800,dia:100,len:40,e90:2,e45:0,teeB:1,teeS:8,gate:2,ball:0,angle:2,check:1},
    {flow:480,dia:80, len:30,e90:0,e45:0,teeB:1,teeS:0, gate:0,ball:0,angle:0,check:0},
    {flow:240,dia:65, len:15,e90:0,e45:0,teeB:1,teeS:0, gate:0,ball:0,angle:0,check:0},
    {flow:80, dia:40, len:10,e90:0,e45:0,teeB:1,teeS:0, gate:0,ball:0,angle:0,check:0},
  ]);

  /* 겸용 펌프 파라미터 */
  const [cPump,setCPump]=useState({pumpDia:150,pumpEff:65,transType:1});
  const ssCp=(k,v)=>setCPump(p=>({...p,[k]:v}));

  /* 건축물 규모(층수) — NFTC 102 + NFTC 103 + NFTC 604 */
  const [buildingFloor,setBuildingFloor]=useState(1);
  // 1: 일반(29층↓) 방수 20min / 2: 고층(30~49층) 40min / 3: 초고층(50층↑) 60min

  const[installPrompt,setInstallPrompt]=useState(null);
  const[showInstallBanner,setShowInstallBanner]=useState(false);
  useEffect(()=>{const h=(e)=>{e.preventDefault();setInstallPrompt(e);if(!window.matchMedia('(display-mode:standalone)').matches)setShowInstallBanner(true);};window.addEventListener('beforeinstallprompt',h);return()=>window.removeEventListener('beforeinstallprompt',h);},[]);
  const handleInstall=async()=>{if(!installPrompt)return;installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==='accepted')console.log('[PWA] 설치 완료');setInstallPrompt(null);setShowInstallBanner(false);};
  const deferredPrompt=installPrompt; /* PWA 설치 FAB에서 참조 */

  /* ═══ A4 계산서 반응형 스케일링 ═══
     transform-origin:0 0 + translateX(lOff)scale(s):
     ① 794px(A4폭)을 좌상단 기준으로 축소
     ② lOff=(outerW−794×scale)/2 → 정확한 중앙 정렬
     ③ outer.height=inner.scrollHeight×scale+40 → 여러 장 빈공간 없음
     인쇄: @media print { transform:none!important } 으로 원본 복원  */
  useEffect(()=>{
    if(tab!==3)return;
    function scaleRpt(){
      const outer=document.getElementById('rpt-outer');
      const inner=document.getElementById('rpt-inner');
      if(!outer||!inner)return;
      const A4W=794;
      const outerW=outer.clientWidth;
      const scale=Math.min(1,(outerW-24)/A4W);
      if(scale>=1){
        inner.style.cssText='width:794px;margin:0 auto;';
        outer.style.height='auto';
      }else{
        const lOff=Math.max(0,(outerW-A4W*scale)/2);
        inner.style.cssText=`width:794px;transform-origin:0 0;transform:translateX(${lOff}px) scale(${scale});`;
        outer.style.height=(inner.scrollHeight*scale+40)+'px';
      }
    }
    const t=setTimeout(scaleRpt,120);
    window.addEventListener('resize',scaleRpt);
    return()=>{clearTimeout(t);window.removeEventListener('resize',scaleRpt);};
  },[tab,hSegs,sSegs,hSys,sSys,cPump,proj]);

  /* ── 옥내소화전 계산 ── */
  const H=useMemo(()=>{
    // NFTC 102 + NFTC 604: 층수에 따른 기준개수·방수시간 동적 적용
    const hMaxCount = buildingFloor===1 ? 2 : 5;          // 일반 2개 / 고층·초고층 5개
    const hWaterTime = buildingFloor===1 ? 20 : buildingFloor===2 ? 40 : 60; // 20/40/60분
    const A=Math.min(hMaxCount,Math.max(1,hSys.hydrants|0));
    const Clpm=A*FLOW_PER_HYDRANT;
    const D=Clpm*hWaterTime/1000;
    let F=0;
    hSegs.forEach(s=>{
      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
      const fl=s.e90*eq[0]+s.e45*eq[1]+s.teeB*eq[2]+s.teeS*eq[3]+s.gate*eq[4]+s.ball*eq[5]+s.angle*eq[6]+s.check*eq[7];
      const tl=(s.len||0)+fl;
      F+=calcFriction(s.flow,s.dia,hSys.pipeType)*tl/100;
    });
    const hose=HOSE_TYPES[hSys.hoseType]||HOSE_TYPES[2];
    const G=hose.fixed!=null?hose.fixed:hose.rate*hSys.hoseLen/100;
    const E=+hSys.actualHead;
    const sub=E+F+G+H_NOZZLE;
    const I=sub*0.1;
    const J=Math.ceil(sub+I);
    return {A,Clpm,D,E,F,G,I,J,hose,hMaxCount,hWaterTime};
  },[hSys,hSegs,buildingFloor]);

  /* ── 스프링클러 계산 ── */
  const S=useMemo(()=>{
    // NFTC 103 + NFTC 604: 층수에 따른 헤드 1개당 수원 동적 적용
    const sWaterPer = buildingFloor===1 ? 1.6 : buildingFloor===2 ? 3.2 : 4.8; // 1.6/3.2/4.8 m³
    const btype=BASE_HEAD_TYPES.find(x=>x.key===sSys.baseType)||BASE_HEAD_TYPES[4];
    const A=btype.n;
    const Clpm=A*FLOW_PER_HEAD;
    const D=A*sWaterPer;
    const E=sSys.actualHead;
    let F=0;
    sSegs.forEach(s=>{
      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];

      const tl=(s.len||0)+fl;
      F+=calcFriction(s.flow,s.dia,sSys.pipeType)*tl/100;
    });
    const G=S_NOZZLE;
    const I=(E+F+G)*0.1;
    const J=Math.ceil(E+F+G+I);
    return {A,Clpm,D,E,F,G,I,J,btype,sWaterPer};

  {showInstallBanner&&<div style={{position:"fixed",bottom:16,left:16,right:16,zIndex:9999}} className="pwa-install-banner"><div style={{borderRadius:16,padding:16,display:"flex",alignItems:"center",gap:12}}><img src="icons/icon-192.png" style={{width:48,height:48,borderRadius:12,flexShrink:0,boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}} alt="겸용펌프 앱 아이콘"/><div style={{flex:1,minWidth:0}}><div style={{color:"white",fontSize:13,fontWeight:800}}>홈 화면에 설치하시겠습니까?</div><div style={{color:"#93c5fd",fontSize:10,fontWeight:600,marginTop:4}}>오프라인에서도 사용 가능합니다</div></div><div style={{display:"flex",gap:8,flexShrink:0}}><button onClick={()=>setShowInstallBanner(false)} style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,padding:"8px 12px",border:"none",background:"transparent",cursor:"pointer",borderRadius:8}}>닫기</button><button onClick={handleInstall} style={{background:"white",color:"#1e3a5f",fontSize:11,fontWeight:900,padding:"8px 16px",border:"none",borderRadius:8,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>설치</button></div></div></div>}

  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<!-- ═══ Service Worker Ver 3.3 ═══ -->
<script>
(function(){
  if(!('serviceWorker' in navigator)) return;

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', {updateViaCache:'none'})
      .then(reg => {
        console.log('[PWA] SW 등록 — scope:', reg.scope);

        /* 업데이트 감지 → 배너 표시 */
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          nw.addEventListener('statechange', () => {
            if(nw.state === 'installed' && navigator.serviceWorker.controller)
              _showUpdateBanner();
          });
        });

        /* 1시간마다 업데이트 체크 */
        setInterval(() => reg.update(), 60 * 60 * 1000);
      })
      .catch(e => console.warn('[PWA] SW 등록 실패:', e));

    /* 컨트롤러 교체 시 자동 새로고침 */
    let _ref = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(!_ref){ _ref = true; location.reload(); }
    });
  });

  function _showUpdateBanner() {
    if(document.getElementById('sw-update-banner')) return;
    const b = document.createElement('div');
    b.id = 'sw-update-banner';
    b.style.cssText = [
      'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999',
      'background:#1e3a5f;color:white;border-radius:14px;padding:12px 18px',
      'display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4)',
      'font-family:"Noto Sans KR",sans-serif;font-size:13px;white-space:nowrap',
      'animation:slideUp .35s ease-out',
    ].join(';');
    b.innerHTML =
      '<span>🔄 새 버전이 있습니다</span>' +
      '<button onclick="(function(){' +
        'document.getElementById(\'sw-update-banner\').remove();' +
        'navigator.serviceWorker.ready.then(r=>{r.waiting&&r.waiting.postMessage({type:\'SKIP_WAITING\'})});' +
      '})()" style="background:#1d4ed8;color:white;border:none;border-radius:8px;' +
        'padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">업데이트</button>' +
      '<button onclick="document.getElementById(\'sw-update-banner\').remove()" ' +
        'style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;' +
        'padding:6px 10px;font-size:11px;cursor:pointer;">나중에</button>';
    document.body.appendChild(b);
  }
})();
</script>
</body>
